name: OCI Build

on:
  workflow_call:
    inputs:
      ref:
        required: false
        type: string
      image:
        required: true
        type: string
      tags:
        required: true
        type: string
      registry:
        required: false
        type: string
        default: ghcr.io
      registry-username:
        required: false
        type: string
        default: ${{ github.repository_owner }}
      containerfile:
        required: false
        default: ./Containerfile
        type: string
    secrets:
      registry-password:
        required: true
    outputs:
      image-with-tag:
        description: 'Name of the image tagged with the first tag present'
        value: ${{ jobs.build.outputs.image-with-tag }}

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    outputs:
      image-with-tag: ${{ steps.build-image.outputs.image-with-tag }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          ref: ${{ inputs.ref }}

      - name: Log in to ${{ inputs.registry }}
        uses: redhat-actions/podman-login@4934294ad0449894bcd1e9f191899d7292469603 #v1.7
        with:
          username: ${{ github.repository_owner }}
          password: ${{ secrets.registry-password }}
          registry: ${{ inputs.registry }}

      - name: Build Image
        id: build-image
        uses: redhat-actions/buildah-build@7a95fa7ee0f02d552a32753e7414641a04307056 #v2.13
        with:
          image: ${{ inputs.image }}
          tags: ${{ inputs.tags }}
          containerfiles: ${{ inputs.containerfile }}
          extra-args: |
            --squash

      - name: Push Image
        uses: redhat-actions/push-to-registry@5ed88d269cf581ea9ef6dd6806d01562096bee9c #v2.8
        with:
          image: ${{ steps.build-image.outputs.image }}
          tags: ${{ steps.build-image.outputs.tags }}
          registry: ${{ inputs.registry }}
