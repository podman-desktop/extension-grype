name: pr-preview.yaml

on:
  workflow_run:
    workflows:
      - 'pr-check'
    types:
      - completed

concurrency:
  group: ${{ github.workflow }}-${{ inputs.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-publish:
    permissions:
      contents: read
      packages: write
    uses: .github/workflows/oci-build.yaml
    if: ${{ github.event.workflow_run.pull_requests[0] != null }}
    with:
      ref: ${{ github.event.workflow_run.head_sha }}
      image: ${{ github.repository }}/pr
      tags: ${{ github.event.workflow_run.pull_requests[0].number }}
      registry-password: ${{ secrets.GITHUB_TOKEN }}